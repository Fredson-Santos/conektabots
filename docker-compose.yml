services:
  # Serviço do Banco de Dados
  db:
    image: postgres:16-alpine
    container_name: conekta_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-conekta}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-conekta}
      - POSTGRES_DB=${POSTGRES_DB:-conektabots}
      - TZ=${TZ:-America/Sao_Paulo}
    volumes:
      - conekta_pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-conekta} -d ${POSTGRES_DB:-conektabots}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Serviço do Site (Painel Web)
  web:
    build: .
    container_name: conekta_web
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - conekta_data:/app/data
    ports:
      - "${WEB_PORT:-8005}:8000"
    environment:
      - TZ=${TZ:-America/Sao_Paulo}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-conekta}:${POSTGRES_PASSWORD:-conekta}@db:5432/${POSTGRES_DB:-conektabots}
      - RUN_MIGRATIONS=true
    restart: always
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # Serviço do Gerente (Bots)
  manager:
    build: .
    container_name: conekta_manager
    command: python manager.py
    volumes:
      - conekta_data:/app/data
    environment:
      - TZ=${TZ:-America/Sao_Paulo}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-conekta}:${POSTGRES_PASSWORD:-conekta}@db:5432/${POSTGRES_DB:-conektabots}
    restart: always
    depends_on:
      web:
        condition: service_healthy

volumes:
  conekta_data:
  conekta_pgdata: