services:
  # Serviço do Site (Painel Web)
  web:
    build: .
    container_name: conekta_web
    command: uvicorn app:app --host 0.0.0.0 --port 8000
    volumes:
      - ./database.db:/app/database.db  # Persiste apenas o banco de dados
    ports:
      - "${WEB_PORT:-8005}:8000"
    environment:
      - TZ=${TZ:-America/Sao_Paulo}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Serviço do Gerente (Bots)
  manager:
    build: .
    container_name: conekta_manager
    command: python manager.py
    volumes:
      - ./database.db:/app/database.db  # Mesmo banco usado pela API
    environment:
      - TZ=${TZ:-America/Sao_Paulo}
    restart: always